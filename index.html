<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Developer Wynd2k</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* PHẦN RESET & CƠ BẢN */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none; /* Ngăn chặn chọn văn bản cho cảm giác native app */
            -webkit-tap-highlight-color: transparent; /* Tắt màu highlight khi chạm trên di động */
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            overflow: hidden; /* Giữ cho trang không bị cuộn để tăng hiệu ứng */
        }

        /* PHẦN HIỆU ỨNG NỀN LIQUID GLASS */
        .liquid-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* Gradient nền mượt mà di chuyển */
            background: linear-gradient(-45deg, #74ebd5, #ACB6E5, #9796f0, #e94057);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            z-index: -1;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* PHẦN CONTAINER BIO - KÍNH MỜ */
        .bio-container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 360px;
            text-align: center;
            padding: 3rem 1.5rem 2rem 1.5rem;
            border-radius: 30px;
            
            /* Hiệu ứng kính lỏng: độ mờ backdrop */
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            
            /* Màu nền kính mờ */
            background-color: rgba(255, 255, 255, 0.1);
            
            /* Viền mờ cho cảm giác kính */
            border: 1px solid rgba(255, 255, 255, 0.2);
            
            /* Bóng đổ mờ để tạo độ sâu */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }
        
        /* Hiệu ứng 'liên kết' kính lỏng cho container */
        .bio-container::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            opacity: 0.5;
        }

        /* PHẦN HEADER */
        .header {
            margin-bottom: 2rem;
            position: relative;
            z-index: 2;
        }
        .avatar-container {
            position: relative;
            display: inline-block;
            width: 130px;
            height: 130px;
            margin-bottom: 1rem;
            border-radius: 50%;
            padding: 5px;
            
            /* Hiệu ứng kính mờ cho vòng ngoài avatar */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.3), 0 5px 15px rgba(0,0,0,0.1);
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
        }
        .name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .tagline {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 1rem;
        }

        /* PHẦN CÁC LIÊN KẾT - CÁC THẺ KÍNH */
        .links-container {
            display: grid;
            gap: 12px;
            position: relative;
            z-index: 2;
        }
        .link-card {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            text-decoration: none;
            color: #fff;
            padding: 15px;
            border-radius: 18px;
            
            /* Hiệu ứng kính lỏng cho mỗi nút */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            
            /* Hiệu ứng bóng đổ mờ */
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        
        /* Hiệu ứng bóng kính lướt qua khi hover */
        .link-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
            z-index: 1;
        }
        .link-card:hover::before {
            left: 100%;
        }

        /* Hiệu ứng hover cho iOS native feel */
        .link-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0.1) 100%);
        }
        .link-card:active {
            transform: translateY(1px);
        }
        
        /* Biểu tượng và văn bản của liên kết */
        .link-icon {
            font-size: 1.3rem;
            margin-right: 12px;
            opacity: 0.9;
            width: 20px;
            text-align: center;
        }
        .link-text {
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* PHẦN FOOTER */
        .footer {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 2rem;
            opacity: 0.8;
            position: relative;
            z-index: 2;
        }
    </style>
</head>
<body>
    <div class="liquid-bg"></div>

    <div class="bio-container">
        <div class="header">
            <div class="avatar-container">
                <img src="https://via.placeholder.com/150" alt="Avatar" class="avatar">
            </div>
            <h1 class="name">LÊ NHỰT QUI</h1>
            <p class="tagline">Nhà thiết kế & Lập trình viên</p>
        </div>

        <div class="links-container">
            <a href="LINK_FACEBOOK" target="_blank" class="link-card">
                <i class="fab fa-facebook-f link-icon"></i>
                <span class="link-text">Facebook</span>
            </a>
            <a href="LINK_INSTAGRAM" target="_blank" class="link-card">
                <i class="fab fa-instagram link-icon"></i>
                <span class="link-text">Instagram</span>
            </a>
            <a href="LINK_LINKEDIN" target="_blank" class="link-card">
                <i class="fab fa-linkedin-in link-icon"></i>
                <span class="link-text">LinkedIn</span>
            </a>
            <a href="LINK_GITHUB" target="_blank" class="link-card">
                <i class="fab fa-github link-icon"></i>
                <span class="link-text">GitHub</span>
            </a>
            <a href="mailto:EMAIL_CUA_BAN" target="_blank" class="link-card">
                <i class="far fa-envelope link-icon"></i>
                <span class="link-text">Gửi Email</span>
            </a>
        </div>

        <div class="footer">
            <p>©Wynd2k • Nuôi Dưỡng Ước Mơ</p>
        </div>
    </div>
</body>
</html>
